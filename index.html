<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomagicln</title>
    <!-- Algolia Verification Tag -->
    <meta name="algolia-site-verification" content="3886DFB52573D01F">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #faf8f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 48px 40px;
            max-width: 520px;
            width: 100%;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a054, #c49a6c);
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 4px 12px rgba(196, 154, 108, 0.3);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .tagline {
            font-size: 14px;
            color: #999;
            margin-bottom: 36px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            text-align: left;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: #fff;
            border: 1.5px solid #e8e4df;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }

        .card:hover {
            border-color: #c9bfb0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            transform: translateY(-1px);
        }

        .card-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .card-icon.bridge {
            background: #eef6ff;
        }

        .card-icon.currency {
            background: #fef7ee;
        }

        .card-body h2 {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2px;
        }

        .card-body p {
            font-size: 13px;
            color: #999;
            line-height: 1.4;
        }

        .footer {
            margin-top: 36px;
            font-size: 12px;
            color: #ccc;
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 18px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="avatar">N</div>
        <h1>Nomagicln</h1>
        <p class="tagline">Welcome to my GitHub Pages</p>

        <div class="card-grid">
            <a class="card" href="/open-bridge/">
                <div class="card-icon bridge">🌉</div>
                <div class="card-body">
                    <h2>OpenBridge</h2>
                    <p>Open-source bridge project</p>
                </div>
            </a>
            <a class="card" href="/currency/">
                <div class="card-icon currency">💱</div>
                <div class="card-body">
                    <h2>汇率计算器</h2>
                    <p>实时汇率换算，支持多种货币</p>
                </div>
            </a>
        </div>

        <div class="footer">© Nomagicln</div>
    </div>
</body>

</html>
